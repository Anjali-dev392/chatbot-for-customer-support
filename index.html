<!DOCTYPE html>
<html>
<head>
    <title>Customer Support Chatbot</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
        }

        #chat-box {
            height: 400px;
            padding: 15px;
            overflow-y: auto;
        }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 10px;
        }

        button {
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="chat-container">

    <div class="header">
        <h2>Customer Support Chatbot</h2>
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="message"
               placeholder="Type your message...">

        <button onclick="sendMessage()">
            Send
        </button>
    </div>

</div>

<script>

function sendMessage() {

    let message =
        document.getElementById("message").value;

    if (message.trim() === "") {
        return;
    }

    let chatBox =
        document.getElementById("chat-box");

    chatBox.innerHTML +=
        "<p><b>You:</b> " + message + "</p>";

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: message
        })
    })

    .then(response => response.json())

    .then(data => {

        chatBox.innerHTML +=
            "<p><b>Bot:</b> "
            + data.response
            + "</p>";

        chatBox.scrollTop =
            chatBox.scrollHeight;

    });

    document.getElementById("message").value = "";
}

</script>

</body>
</html>
